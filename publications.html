<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publications | Wambui EK Law Advocates</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://kit.fontawesome.com/6d55c8f183.js" crossorigin="anonymous"></script>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
</head>
<body class="publications-page">
<div class="page-wrapper">
  <header>
    <div class="logo"><a href="index.html"><img src="images/LOGO (Reverse).png" alt="Firm Logo" class="logo-img"></a></div>
    <nav>
      <button class="menu-toggle" id="menu-toggle">&#9776;</button>
      <ul id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#services">Practice Areas</a></li>
        <li><a href="publications.html">Publications</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

<br></br>
<section class="page-title">
  <h1>Our Publications</h1>
</section>

<section class="content">
  <div class="publications" id="live-publications-container">
    <p style="text-align: center; font-size: 1.2rem; color: #666; width: 100%;">Loading latest publications...</p>
  </div>
</section>


  <footer>
    <p>&copy; 2025 Wambui EK Law Advocates. All rights reserved.</p>
  </footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="script.js"></script>
  

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // Web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBByojxbcXlEEFA6u4JT_WzKcUrvnK0yFg",
    authDomain: "wambui-ek-law.firebaseapp.com",
    projectId: "wambui-ek-law",
    storageBucket: "wambui-ek-law.firebasestorage.app",
    messagingSenderId: "740875289878",
    appId: "1:740875289878:web:9e96de0159dd06070a7c37",
    measurementId: "G-NYTXG0RB1Z"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const container = document.getElementById('live-publications-container');

  // Query database in real-time, sorting by descending time
  const q = query(collection(db, "publications"), orderBy("createdAt", "desc"));

  onSnapshot(q, (snapshot) => {
    if (snapshot.empty) {
      container.innerHTML = `<p style="text-align: center; color: #666; width: 100%;">No publications posted yet.</p>`;
      return;
    }

    let htmlContent = '';
    snapshot.forEach((doc) => {
      const data = doc.data();
      
      // Compute cleanly formatted date string
      let dateString = "Recently";
      if (data.createdAt) {
        const date = data.createdAt.toDate();
        dateString = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      }

      // Generate HTML matching your exact CSS block selectors
      htmlContent += `
        <div class="publication">
          <div class="publication-image-wrapper">
            <img src="${data.image}" alt="${data.title}" class="publication-image">
          </div>
          <div class="publication-content">
            <h2>${data.title}</h2>
            <p><strong>Author:</strong> ${data.author}</p>
            <p><strong>Published:</strong> ${dateString}</p>
            <p>${data.content}</p>
            <a href="${data.link}" target="_blank" class="btn">Read More</a>
          </div>
        </div>
      `;
    });

    container.innerHTML = htmlContent;
  });
</script>

</body>
</html>
